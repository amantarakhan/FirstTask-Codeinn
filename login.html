<!DOCTYPE html>

<head>
  <title> LogIn Page </title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="pageContainer">
    <div class="FormSection">
      <div class="whole-card">
        <div class="header">
          <h1> Welcome Back </h1>
          <p> Don't have an account? <a href="signIn.html"> Create one </a> </p>
        </div>

        <hr class="divider">
        <form action="your-success-page.html" method="GET">
          <div>
            <label> Email </label>
            <br>
            <input type="email" class="input_fields" placeholder="you@email.com">
          </div>
          <div>
            <label> Password </label>
            <br>
            <input type="password" class="input_fields" placeholder="********">
          </div>
          <a class="pass_reminder" href="forgetpass.html"> Forget Password ?  </a>


          <div>
            <button class="button" type="submit"> Log in </button>
          </div>
        </form>
        <hr class="divider">
        <div>
          <p class="notes"> By continuing, you agree to our Terms of Service and Privacy Policy. </p>

        </div>

      </div>
    </div>
    <div class="imageSection">
      <img src="image1.svg">
    </div>
  </div>
</body>
