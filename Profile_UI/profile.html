<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Profile Page </title>
    <link rel="stylesheet" href="ProfileStyle.CSS" />
</head>

<body>
    <div class="cardContainer">
        <!-- this is the mother div (will contain all the content) -->
        <div class="card">
            <!-- this is the div that will hold the card -->
            <div class="pfpContainer">
                <label for="pfpUpload" class="pfpLabel">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png"
                        class="pfpImg">
                </label>
            </div>
            <input type="file" id="pfpUpload" class="pfpInput">
            
            <div class="userName">
                <!-- this div to hold the User name section -->
                <h2> Omar Tarakhan </h2>
            </div>
            <div class="Useremail">
                <div class="emailRow">
                    <span>Omar@gmail.com </span>
                    <img class="editIcon" src="../Profile_UI/assets/editIcon.svg">
                </div>
            </div>
            <div class="UserBio">
                <!-- this div is for short Bio-->
                <p> FrontEnd Developer and software engineer , Exploring new technologies and sharing knowledge with the
                    community </p>
            </div>

            <!-- now for the Blog card section - also vertical -->
            <div class="blogSection">
                <!-- this div hold the whole card -->
                <h2> Blogs Published </h2>
                <hr class="divider">
                <h4> 12 </h4>
            </div>




            <!-- now for the buttons section -->
            <div class="buttonsSection">
                <div class="editButton">
                    <button> edit Profile </button>
                </div>
                <div class="Logoutbutton">
                    <button> LogOut </button>
                </div>
            </div>
        </div>

    </div>
</body>
