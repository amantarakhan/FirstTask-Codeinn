<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Briefly</title>
  <link rel="stylesheet" href="../style/auth.css" />

  <!-- these 2 lines are for using the sweetAlert library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>
  <div class="pageContainer">

    <!-- Left: Form -->
    <div class="FormSection">
      <div class="whole-card">

        <!-- Logo — always links to home -->
        <div class="logo">
          <a href="../homePage/home.html" style="display:flex; align-items:center; text-decoration:none;">
            <img class="logo-icon" src="../assests/logoWithoutName - Copy.png" alt="Briefly logo icon">
            <img class="logo-name" src="../assests/name.png" alt="Briefly">
          </a>
        </div>

        <!-- Header -->
        <div class="header">
          <h1>Welcome Back</h1>
          <p>Enter your credentials to continue your journey.</p>
        </div>

        <!-- Form — id="loginForm" used by script.js -->
        <form id="loginForm" action="../homePage/home.html">

          <div>
            <label for="email">Email</label>
            <input id="email" type="email" class="input_fields" placeholder="name@example.com">
          </div>

          <div>
            <label for="password">Password</label>
            <input id="password" type="password" class="input_fields" placeholder="••••••••">
            <a class="pass_reminder" href="forgetpass.html">Forgot Password?</a>
          </div>

          <div>
            <button class="button" type="submit">Sign In</button>
          </div>

        </form>

        <!-- OR divider -->
        <div class="or-divider">
          <hr>
          <span>Or sign in with</span>
          <hr>
        </div>

        <!-- Social buttons -->
        <div class="social-buttons">
          <a class="social-btn" href="#">Google</a>
          <a class="social-btn" href="#">Apple</a>
        </div>

        <!-- Bottom note -->
        <hr class="divider">
        <p class="notes">
          Don't have an account? <a href="signIn.html" style="color: var(--color-link); font-weight: 600;">Sign Up</a>
        </p>

      </div>
    </div>

    <!-- Right: Image -->
    <div class="imageSection">
      <img src="../assests/loginImg.png" alt="Illustration">
    </div>

  </div>
  <script src="script.js"></script>
</body>

</html>
