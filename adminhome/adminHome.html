<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Stories — Briefly (Admin)</title>
    <link rel="stylesheet" href="../style/allBlogs.css" />
    <!-- this is for the icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>
    <div class="pageLayout">

        <!-- ── HEADER ── -->
        <header>
            <nav class="navBar">
                <div class="logo">
                    <a href="../homePage/home.html" style="display:flex; align-items:center; text-decoration:none;">
                        <img class="logo-icon" src="../assests/logoWithoutName - Copy.png" alt="Briefly logo icon">
                        <img class="logo-name" src="../assests/name.png" alt="Briefly">
                    </a>
                </div>
                <ul class="navList">
                    <li><a href="../adminhome/adminHome.html" class="active">All Blogs</a></li>
                    <li><a href="../adminDash/adminDash.html">Admin Dashboard</a></li>
                </ul>
            </nav>
        </header>

    <!-- ── MAIN ── -->
        <main>

            <!-- 1. Hero Banner -->
            <section class="allStoriesHero">
                <h1 class="allStoriesTitle">Explore All Stories</h1>
                <p class="allStoriesSubtitle">Archiving the Future</p>
            </section>

            <!-- 2. SEARCH & FILTER BAR -->
            <!-- sits between the hero and the grid so the user can narrow results before browsing -->
            <section class="searchFilterSection">

                <!-- Search bar row: input on the left, sort select on the right -->
                <div class="searchBarRow">
                    <div class="searchWrapper">
                        <i class="fa-solid fa-magnifying-glass searchIcon"></i>
                        <input
                            type="text"
                            id="searchInput"
                            class="searchInput"
                            placeholder="Search stories by title or keyword…"
                        />
                        <!-- Clear (✕) button — shown by JS when the input has text -->
                        <button class="searchClearBtn" id="searchClearBtn" style="display:none;" aria-label="Clear search">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <select id="sortSelect" class="sortSelect">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>

                <!-- Category filter pills — "All" is active by default -->
                <!-- JS reads data-cat to filter the blogs array -->
                <div class="filterRow" id="filterRow">
                    <button class="filterPill active" data-cat="all">All</button>
                    <button class="filterPill" data-cat="finance">Finance</button>
                    <button class="filterPill" data-cat="lifestyle">Lifestyle</button>
                    <button class="filterPill" data-cat="food">Food</button>
                    <button class="filterPill" data-cat="business">Business</button>
                    <button class="filterPill" data-cat="games">Games</button>
                    <button class="filterPill" data-cat="training">Training</button>
                    <button class="filterPill" data-cat="technology">Technology</button>
                    <button class="filterPill" data-cat="travel">Travel</button>
                    <button class="filterPill" data-cat="health">Health</button>
                    <button class="filterPill" data-cat="education">Education</button>
                    <button class="filterPill" data-cat="entertainment">Entertainment</button>
                    <button class="filterPill" data-cat="other">Other</button>
                </div>

            </section>

            <!-- 3. Stories Grid Section -->
            <section class="allStoriesSection">

                <!-- Empty state -->
                <div class="emptyState" id="allBlogsEmpty" style="display:none;">
                    <div class="emptyIcon">📭</div>
                    <p>No blogs published yet.<br>
                        <a href="../createBlogPage/create.html">Be the first to create a story!</a>
                    </p>
                </div>

                <!-- Cards Grid -->
                <div class="storiesGrid" id="storiesGrid"></div>

            </section>

        </main>

        <!-- ── FOOTER ── -->
        <footer>
            <p>&copy; <span id="footerYear">2026</span> Blog Platform. All rights reserved.</p>
        <script>document.getElementById("footerYear").textContent=new Date().getFullYear();</script>
        </footer>

    </div>

    <script src="../allBlogsPage/script.js"></script>
</body>
</html>
