<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- for the responsiveness -->
    <title>All Stories — Briefly</title>
    <link rel="stylesheet" href="../style/allBlogs.css" />
</head>

<body>
    <div class="pageLayout">

        <!--  HEADER c- reuse   -->
        <header>
            <nav class="navBar">
                <div class="logo">
                    <img class="logo-icon" src="../assests/logoWithoutName - Copy.png" alt="Briefly logo icon">
                    <img class="logo-name" src="../assests/name.png" alt="Briefly">
                </div>
                <ul class="navList">
                    <li><a href="../homePage/home.html">Home</a></li>
                    <li><a href="../ProfilePage/profile.html">Profile</a></li>
                    <li><a href="../contactPage/contact.html">Contact</a></li>
                    <li><a href="../createBlogPage/create.html" class="active">Create Blog</a></li>
                </ul>
                <div class="pfpContainer">
                    <a href="../ProfilePage/profile.html">
                        <img id="navbarPfp" src="../assests/PFPplaceholder.png" class="pfp" alt="Profile">
                    </a>
                </div>
            </nav>
        </header>

        <!-- ── MAIN ── -->
        <main>

            <!-- Hero Banner -->
            <section class="allStoriesHero">
                <h1 class="allStoriesTitle">Explore All Stories</h1>
                <p class="allStoriesSubtitle">Archiving the Future</p>
            </section>

            <!-- Stories Grid -->
            <section class="allStoriesSection">

                <!-- Empty state - this is will dispaly if there is nothing to show -->
                <div class="emptyState" id="allBlogsEmpty" style="display:none;">
                    <div class="emptyIcon">📭</div>
                    <p>No blogs published yet.<br><a href="../createBlogPage/create.html">Be the first to create a story!</a></p>
                </div>

                <!-- Grid -> this div will dispaly if there actually blogs to show -> using the loop in the js -->
                <div class="storiesGrid" id="storiesGrid">
                    <!-- will be filled by the loop in the JS -->
                </div>
            </section>
        </main>
        <!--  FOOTER - reuse  -->
        <footer>
            <p>&copy; 2026 Blog Platform. All rights reserved.</p>
        </footer>
    </div>
    <script src="../allBlogsPage/script.js"></script>
</body>
</html>
