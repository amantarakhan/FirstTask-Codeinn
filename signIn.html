<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-viewport flex container — centers the card on screen -->
  <div class="page-wrapper">

    <!-- Frosted glass card -->
    <div class="card">

      <!-- Page title + link back to login -->
      <div class="card-header">
        <h1>Create your account</h1>
        <p>Already have an account? <a href="login.html">Log in instead</a></p>
      </div>

      <!-- Thin decorative line between header and form -->
      <div class="divider"></div>

      <!-- action="#" keeps us on the page (no server yet) | method="post" hides data from the URL -->
      <form class="auth-form" action="#" method="post">

        <!-- Full Name field -->
        <!-- type="text" accepts any characters | autocomplete="name" lets browser autofill saved names -->
        <div class="field-group">
          <label class="field-label" for="signup-name">Full Name <span class="required">*</span></label>
          <div class="field-input-wrap">
            <input type="text" id="signup-name" name="fullname" placeholder="John Doe" autocomplete="name" />
            <!-- Person icon -->
            <span class="input-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- Email field -->
        <!-- type="email" makes the browser validate the @ and . format -->
        <div class="field-group">
          <label class="field-label" for="signup-email">Email <span class="required">*</span></label>
          <div class="field-input-wrap">
            <input type="email" id="signup-email" name="email" placeholder="name@example.com" autocomplete="email" />
            <!-- Envelope icon -->
            <span class="input-icon">
              <svg viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="3"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- Password field -->
        <!-- type="password" masks characters as dots -->
        <!-- autocomplete="new-password" tells the browser this is a NEW password, not a saved one -->
        <div class="field-group">
          <label class="field-label" for="signup-password">Password <span class="required">*</span></label>
          <div class="field-input-wrap">
            <input type="password" id="signup-password" name="password" placeholder="Create a strong password" autocomplete="new-password" />
            <!-- Lock icon -->
            <span class="input-icon">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
          </div>
          <!-- Four bars that could visually show password strength (weak → strong) — styling only, no JS yet -->
          <div class="strength-dots">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <!-- Confirm Password field -->
        <!-- name="confirm_password" is different from name="password" so the server can compare them -->
        <div class="field-group">
          <label class="field-label" for="signup-confirm">Confirm Password <span class="required">*</span></label>
          <div class="field-input-wrap">
            <input type="password" id="signup-confirm" name="confirm_password" placeholder="Re-enter your password" autocomplete="new-password" />
            <!-- Shield icon -->
            <span class="input-icon">
              <svg viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- type="submit" sends the form when clicked -->
        <button type="submit" class="btn-submit">Create Account</button>

      </form>

      <!-- Legal note at the bottom — has a top border to separate it from the form -->
      <p class="terms-note">
        By signing up, you agree to our <strong>Terms of Service</strong> and <strong>Privacy Policy</strong>.
      </p>

    </div>

  </div>

</body>
</html>
