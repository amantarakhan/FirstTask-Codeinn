<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Briefly</title>
    <link rel="stylesheet" href="../style/adminDash.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="pageLayout">

        <header>
            <nav class="navBar">
                <div class="logo">
                    <a href="../homePage/home.html" style="display:flex; align-items:center; text-decoration:none;">
                        <img class="logo-icon" src="../assests/logoWithoutName - Copy.png" alt="Briefly logo icon">
                        <img class="logo-name" src="../assests/name.png" alt="Briefly">
                    </a>
                </div>
                <ul class="navList">
                    <li><a href="../adminhome/adminHome.html">All Blogs</a></li>
                    <li><a href="#" class="active">Admin Dashboard</a></li>
                </ul>
            </nav>
        </header>

        <!-- ── MAIN DASHBOARD ── -->
        <main>
            <section class="adminDashboard">

                <section class="dashboardHeader">
                    <h1 class="dashboardTitle">Pending Blogs Approval</h1>
                    <p class="dashboardSubtitle">Approve blogs before they appear on the main site.</p>
                </section>
                <!-- Empty state -->
                <div class="emptyState" id="adminEmpty">
                    <div class="emptyIcon">✅</div>
                    <p>No pending blogs at the moment.</p>
                </div>

                <!-- Blogs Grid -->
                <div class="blogsGrid" id="pendingBlogsGrid">
                </div>

            </section>
        </main>

        <!-- ── FOOTER ── -->
        <footer>
            <p>&copy; <span id="footerYear"></span> Blog Platform. All rights reserved.</p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
