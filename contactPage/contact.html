<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact US </title>
    <link rel="stylesheet" href="../style/contact.css" />
    
      <!-- these 2 lines are for using the sweetAlert library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



    <!-- EmailJS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function () {
            emailjs.init({ publicKey: "hGj2llhQaa2d41tld" }); /* GOT THE PUBLIC KEY FROM THE EmailJs */
        })();
    </script>



</head>

<body>
    <div class="pageLayout">

        <!--Header (inside it is the nav bar ) -->
        <header>
            <nav class="navBar">
                <!-- Logo -->
                <div class="logo">
                    <a href="../homePage/home.html" style="display:flex; align-items:center; text-decoration:none;">
                        <img class="logo-icon" src="../assests/logoWithoutName - Copy.png">
                        <img class="logo-name" src="../assests/name.png">
                    </a>
                </div>

                <!-- Nav links -->
                <ul class="navList">
                    <li><a href="../homePage/home.html">Home</a></li>
                    <li><a href="../ProfilePage/profile.html">Profile</a></li>
                    <li><a href="../contactPage/contact.html" class="active">Contact</a></li>
                    <li><a href="../createBlogPage/create.html">Create Blog</a></li>
                </ul>

                <!-- Profile picture -->
                <div class="pfpContainer">
                    <a href="../ProfilePage/profile.html">
                        <img id="navbarPfp" src="../assests/PFPplaceholder.png" class="pfp" alt="Profile">
                    </a>
                </div>
            </nav>
        </header>

        <!-- Main: 2 sections side by side (one for the contact info and one for the form ) -->
        <main>

            <!-- Section 1: Contact info (left) -->
            <section class="leftSection">
                <div class="infoCard">
                    <h2>Contact Information</h2>

                    <div class="infoList">
                        <p>
                            <span class="infoLabel">Phone</span>
                            <a href="/cdn-cgi/l/email-protection#53323e323d27322132383b323d13343e323a3f7d303c3e" style="text-decoration: none; color: #2B2118;"><span class="__cf_email__" data-cfemail="b9d8d4d8d7cdd8cbd8d2d1d8d7f9ded4d8d0d597dad6d4">[email&#160;protected]</span></a>
                        </p>
                        <p>
                            <span class="infoLabel">Phone</span>
                            <a href="tel:0788355415" style="text-decoration: none; color: #2B2118;">0788355415</a>
                        </p>
                        <p>
                            <span class="infoLabel">Location : </span>
                            <a href="https://maps.app.goo.gl/9Cp2yxEDzBCUUj6X7"
                                style="text-decoration: none; color: #2B2118;">Queen Rania St 362, Amman</a>
                        </p>
                    </div>
                </div>

                <!-- image sits below the info card -->
                <div class="image">
                    <img src="../assests/contactIllustration.png">
                </div>
            </section>

            <!-- Section 2: Contact form (right) -->
            <section class="rightSection">
                <div class="formCard">
                    <h2>Get in Touch</h2>
                    <p class="formSubtitle">Have a story to share or a question for our editors?<br>We'd love to hear
                        from you.</p>

                    <!-- id="contactForm" is used by EmailJS sendForm -->
                    <form id="contactForm">

                        <div class="fieldGroup">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" class="input_fields" name="name"
                                placeholder="E.g. Aman tarakhan" required>
                            <!-- added required so the button cant be pressed of its empty -->
                        </div>

                        <div class="fieldGroup">
                            <label for="userEmail">Email</label>
                            <input type="email" id="userEmail" class="input_fields" name="email"
                                placeholder="aman@example.com" required>
                        </div>

                        <div class="fieldGroup">
                            <label for="userMessage">Your Message</label>
                            <textarea id="userMessage" class="input_fields textarea" name="message"
                                placeholder="Write your message here..." rows="5" required></textarea>
                        </div>

                        <!-- feedback shown after send -->
                        <p id="formFeedback" class="formFeedback"></p>

                        <button type="submit" class="sendButton">Send Message ➜</button>

                    </form>
                </div>
            </section>

        </main>

        <!-- ── Footer ── -->

        <footer>
           <p>&copy; <span id="footerYear"></span> Blog Platform. All rights reserved.</p>
        </footer>

    </div>

    <script src="../contactPage/script.js"></script>
</body>

</html>
