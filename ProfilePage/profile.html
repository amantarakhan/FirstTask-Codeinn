<!DOCTYPE html>


<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="../style/profile.css" />
    <style>
        /* Bio editable hint */
        #bioSection { position: relative; }
        .bioHint {
            display: block;
            font-size: 0.75rem;
            color: var(--color-primary, #C8714A);
            opacity: 0;
            margin-top: 4px;
            transition: opacity 0.2s ease;
        }
        #bioSection:hover .bioHint { opacity: 1; }
    </style>
      <!-- these 2 lines are for using the sweetAlert library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>
    <div class="pageLayout">
                <!-- this is the mother div (will contain all the content) -->
                 <header>
            <nav class="navBar">
                <!-- Logo — always links to home -->
                <div class="logo">
                    <a href="../homePage/home.html" style="display:flex; align-items:center; text-decoration:none;">
                        <img class="logo-icon" src="../assests/logoWithoutName - Copy.png">
                        <img class="logo-name" src="../assests/name.png">
                    </a>
                </div>

                <!-- Nav links -->
                <ul class="navList">
                    <li><a href="../homePage/home.html">Home</a></li>
                    <li><a href="../ProfilePage/profile.html" class="active">Profile</a></li>
                    <li><a href="../contactPage/contact.html">Contact</a></li>
                    <li><a href="../createBlogPage/create.html">Create Blog</a></li>
                </ul>

                <!-- Profile picture -->
                <div class="pfpContainer">
                    <a href="../ProfilePage/profile.html">
                        <img id="navbarPfp" src="../assests/PFPplaceholder.png" class="pfp" alt="Profile">
                    </a>
                </div>
            </nav>
        </header>

        <!-- Main: card centered -->
        <main>
        <div class="card">

            <!-- Name — grid column 1, row 1 -->
            <div class="userName">
                <h2>Guest User</h2>
            </div>

            <!-- Email — grid column 1, row 2 -->
            <div class="Useremail">
                <div class="emailRow">
                    <img class="editIcon" src="../assests/editIcon.svg" alt="edit">
                    <span>No email saved</span>
                </div>
            </div>

            <!-- Bio — grid column 1, row 3 -->
            <div class="UserBio" id="bioSection" onclick="editBio()" title="Click to edit bio" style="cursor:pointer;">
                <p id="bioText">No bio yet.</p>
                <span class="bioHint">✏️ Click to edit</span>
            </div>

            <!-- Blog count — grid column 1, row 4 -->
            <div class="blogSection">
                <h2>Author Portfolio</h2>
                <h4>Blogs Published: <span>0</span></h4>
            </div>

            <!-- Buttons — grid column 1, row 5 -->
            <div class="buttonsSection">
                <div class="editButton">
                    <button>Edit Profile</button>
                </div>
                <div class="Logoutbutton">
                    <button id="logoutBtn">Logout</button>
                </div>
            </div>

            <!-- Profile photo — grid column 2, spans all rows -->
            <div class="cardPfpContainer">
                <label for="pfpUpload" class="pfpLabel">
                    <img src="../assests/PFPplaceholder.png" class="pfpImg" alt="Profile Picture">
                </label>
            </div>
            <input type="file" id="pfpUpload" class="pfpInput" accept="image/*">

        </div>
        </main>

        <!-- ── FOOTER ── -->
        <footer>
            <p>&copy; <span id="footerYear"></span> Blog Platform. All rights reserved.</p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
