<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Briefly</title>
    <link rel="stylesheet" href="../style/profile.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="pageLayout">

        <!-- ── HEADER ── -->
        <header>
            <nav class="navBar">
                <div class="logo">
                    <a href="../homePage/home.html" style="display:flex; align-items:center; text-decoration:none;">
                        <img class="logo-icon" src="../assests/logoWithoutName - Copy.png" alt="Briefly logo icon">
                        <img class="logo-name" src="../assests/name.png" alt="Briefly">
                    </a>
                </div>
                <ul class="navList">
                    <li><a href="../homePage/home.html">Home</a></li>
                    <li><a href="../ProfilePage/profile.html" class="active">Profile</a></li>
                    <li><a href="../contactPage/contact.html">Contact</a></li>
                    <li><a href="../createBlogPage/create.html">Create Blog</a></li>
                </ul>
                <div class="pfpContainer">
                    <a href="../ProfilePage/profile.html">
                        <img id="navbarPfp" src="../assests/PFPplaceholder.png" class="pfp" alt="Profile">
                    </a>
                </div>
            </nav>
        </header>

        <!-- ── MAIN ── -->
        <main>

            <!-- 1. USER INFO HERO STRIP -->
            <section class="profileHero">

                <!-- Left: avatar -->
                <div class="profileAvatarWrap">
                    <label for="pfpUpload" class="pfpLabel" title="Change photo">
                        <img id="profilePfpImg" src="../assests/PFPplaceholder.png" class="profileAvatar" alt="Profile Picture">
                        <div class="avatarOverlay"><i class="fa-solid fa-camera"></i></div>
                    </label>
                    <input type="file" id="pfpUpload" class="pfpInput" accept="image/*">
                </div>

                <!-- Middle: name / email / bio -->
                <div class="profileInfo">
                    <h1 class="profileName" id="profileName">Guest User</h1>

                    <div class="profileEmailRow">
                        <i class="fa-solid fa-envelope"></i>
                        <span id="profileEmail">No email saved</span>
                        <img class="editIcon" src="../assests/editIcon.svg" alt="edit email" id="editEmailIcon" title="Edit email">
                    </div>

                    <div class="profileBioRow" id="bioSection" onclick="editBio()" title="Click to edit bio">
                        <p id="bioText">No bio yet.</p>
                        <span class="bioHint"><i class="fa-solid fa-pen"></i> Click to edit</span>
                    </div>
                </div>

                <!-- Right: stats + action buttons -->
                <div class="profileActions">
                    <div class="profileStat">
                        <span class="statNumber" id="blogCountDisplay">0</span>
                        <span class="statLabel">Blogs Published</span>
                    </div>
                    <div class="profileButtons">
                        <button class="btnPrimary" id="editProfileBtn">
                            <i class="fa-solid fa-user-pen"></i> Edit Profile
                        </button>
                        <button class="btnOutline" id="logoutBtn">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                        </button>
                    </div>
                </div>

            </section>

            <!-- 2. MY STORIES SECTION -->
            <section class="myStoriesSection">

                <div class="myStoriesHeader">
                    <h2 class="myStoriesTitle">My Stories</h2>
                    <a href="../createBlogPage/create.html" class="newStoryBtn">
                        <i class="fa-solid fa-plus"></i> New Story
                    </a>
                </div>

                <!-- Empty state -->
                <div class="emptyState" id="profileEmpty" style="display:none;">
                    <div class="emptyIcon">✍️</div>
                    <p>You haven't published any stories yet.<br>
                        <a href="../createBlogPage/create.html">Write your first story!</a>
                    </p>
                </div>

                <!-- Cards Grid — same structure as allBlogs storiesGrid -->
                <div class="storiesGrid" id="profileStoriesGrid"></div>

            </section>

        </main>

        <!-- ── FOOTER ── -->
        <footer>
            <p>&copy; <span id="footerYear"></span> Blog Platform. All rights reserved.</p>
        </footer>

    </div>

    <script>document.getElementById("footerYear").textContent = new Date().getFullYear();</script>
    <script src="script.js"></script>
</body>

</html>
